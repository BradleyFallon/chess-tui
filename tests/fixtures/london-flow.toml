version = 2
name = "London Test"
start_fen = "startpos"
side = "white"

[[states]]
id = "before-nf3"
when = { all = [{ at = { piece = "piece:white:pawn:d", square = "d4" } }, { at = { piece = "piece:white:bishop:queenside", square = "f4" } }, { at = { piece = "piece:white:pawn:e", square = "e3" } }] }

[[rules]]
id = "develop-d-pawn"
priority = 1000
kind = "development"
piece = "piece:white:pawn:d"
target = "d4"
note = "Control the center."

[[rules]]
id = "develop-dark-bishop"
priority = 900
kind = "development"
piece = "piece:white:bishop:queenside"
target = "f4"
note = "Develop outside the pawn chain."
ready_when = { moved = "piece:white:pawn:d" }

[[rules]]
id = "develop-e-pawn"
priority = 800
kind = "development"
piece = "piece:white:pawn:e"
target = "e3"
ready_when = { all = [{ moved = "piece:white:pawn:d" }, { moved = "piece:white:bishop:queenside" }] }

[[rules]]
id = "develop-knight"
priority = 700
kind = "development"
piece = "piece:white:knight:kingside"
target = "f3"
ready_when = { state = "before-nf3" }

[[overrides]]
id = "after-d4-e5"
after = ["d4", "e5"]
note = "Capture the offered pawn."
move = { piece = "piece:white:pawn:d", to = "e5" }

[[opponent_replies]]
id = "after-d4-d5"
after = ["d4"]
move = "d5"

[[opponent_replies]]
id = "after-d4-e5"
after = ["d4"]
move = "e5"
