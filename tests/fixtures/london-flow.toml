version = 2
name = "London Test"
start_fen = "startpos"
side = "white"

[[states]]
id = "before-nf3"
when = { all = [{ at = { piece = "white:d2", square = "d4" } }, { at = { piece = "white:c1", square = "f4" } }, { at = { piece = "white:e2", square = "e3" } }] }

[[rules]]
id = "develop-d-pawn"
priority = 400
note = "Control the center."
move = { piece = "white:d2", to = "d4" }
retire_when = { moved = "white:d2" }

[[rules]]
id = "develop-dark-bishop"
priority = 390
note = "Develop outside the pawn chain."
move = { piece = "white:c1", to = "f4" }
activate_when = { moved = "white:d2" }
retire_when = { moved = "white:c1" }

[[rules]]
id = "develop-e-pawn"
priority = 380
move = { piece = "white:e2", to = "e3" }
activate_when = { all = [{ moved = "white:d2" }, { moved = "white:c1" }] }
retire_when = { moved = "white:e2" }

[[rules]]
id = "develop-knight"
priority = 370
move = { piece = "white:g1", to = "f3" }
activate_when = { state = "before-nf3" }
retire_when = { moved = "white:g1" }

[[overrides]]
id = "after-d4-e5"
after = ["d4", "e5"]
note = "Capture the offered pawn."
move = { piece = "white:d2", to = "e5" }

[[opponent_replies]]
id = "after-d4-d5"
after = ["d4"]
move = "d5"

[[opponent_replies]]
id = "after-d4-e5"
after = ["d4"]
move = "e5"
