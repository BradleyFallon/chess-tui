version = 2
name = "London System"
start_fen = "startpos"
side = "white"

[[states]]
id = "london-before-nf3"
when = { all = [{ at = { piece = "white:d2", square = "d4" } }, { at = { piece = "white:c1", square = "f4" } }, { at = { piece = "white:e2", square = "e3" } }] }

[[states]]
id = "london-core"
when = { all = [{ state = "london-before-nf3" }, { at = { piece = "white:g1", square = "f3" } }] }

[[rules]]
id = "develop-d-pawn"
priority = 400
note = "Control the center."
move = { piece = "white:d2", to = "d4" }
retire_when = { moved = "white:d2" }

[[rules]]
id = "develop-dark-bishop"
priority = 390
note = "Develop the dark-squared bishop outside the pawn chain."
move = { piece = "white:c1", to = "f4" }
activate_when = { moved = "white:d2" }
retire_when = { moved = "white:c1" }

[[rules]]
id = "develop-e-pawn"
priority = 380
note = "Support d4 and prepare normal development."
move = { piece = "white:e2", to = "e3" }
activate_when = { all = [{ moved = "white:d2" }, { moved = "white:c1" }] }
retire_when = { moved = "white:e2" }

[[rules]]
id = "develop-kingside-knight"
priority = 370
note = "Develop the king's knight and guard e5."
move = { piece = "white:g1", to = "f3" }
activate_when = { state = "london-before-nf3" }
retire_when = { moved = "white:g1" }

[[rules]]
id = "develop-light-bishop"
priority = 360
note = "Natural development."
move = { piece = "white:f1", to = "d3" }
activate_when = { state = "london-core" }
retire_when = { moved = "white:f1" }

[[rules]]
id = "build-c3"
priority = 350
note = "Build the London pawn chain."
move = { piece = "white:c2", to = "c3" }
activate_when = { all = [{ state = "london-core" }, { at = { piece = "white:f1", square = "d3" } }] }
retire_when = { moved = "white:c2" }

[[overrides]]
id = "after-d4-e5"
after = ["d4", "e5"]
note = "Capture the offered pawn."
move = { piece = "white:d2", to = "e5" }

[[overrides]]
id = "qa4-check-after-c4"
after = ["d4", "d5", "Bf4", "Nf6", "e3", "e6", "Nf3", "c5", "Bd3", "Qb6", "c3", "c4"]
note = "Use the check to meet Black's queenside expansion."
move = { piece = "white:d1", to = "a4" }

[[overrides]]
id = "qb4-after-bd7"
after = ["d4", "d5", "Bf4", "Nf6", "e3", "e6", "Nf3", "c5", "Bd3", "Qb6", "c3", "c4", "Qa4+", "Bd7"]
note = "Keep pressure on the queenside after ...Bd7."
move = { piece = "white:d1", to = "b4" }

[[opponent_replies]]
id = "after-d4-d5-bf4-nf6-e3-e6-nf3-c5-bd3-qb6"
after = ["d4", "d5", "Bf4", "Nf6", "e3", "e6", "Nf3", "c5", "Bd3"]
move = "Qb6"

