version = 4
name = "Accelerated London"
start_fen = "startpos"
side = "white"
development_order = ["d-pawn", "london-bishop", "e-pawn", "kingside-knight", "c-pawn", "queenside-knight", "kingside-bishop", "king", "queen"]
interrupt_order = ["d-pawn.accept-englund", "d-pawn.advance-against-early-c5", "london-bishop.escape-attack", "queenside-knight.develop-behind-c4", "queenside-knight.handle-pressure", "d-pawn.take-bishop", "c-pawn.challenge-center"]

[[opening_tags]]
eco = "A40"
name = "Queen's Pawn Game"

[[opening_tags]]
eco = "D00"
name = "Queen's Pawn Game: Accelerated London System"

[pieces.d-pawn]
ref = "piece:white:pawn:d"

[pieces.d-pawn.develop]
to = "d4"
why = "Claim the center and clear the London bishop's diagonal."

[[pieces.d-pawn.rules]]
id = "accept-englund"
after = ["d4", "e5"]
required = true
try = [{ move = "e5" }]
why = "Accept the offered Englund pawn."

[[pieces.d-pawn.rules]]
id = "advance-against-early-c5"
when = { all = [{ last_move = { piece = "black-c-pawn", to = "c5" } }, { at = { piece = "self", square = "d4" } }] }
try = [{ move = "d5" }]
why = "Claim space when Black challenges the center immediately with c5."

[[pieces.d-pawn.rules]]
id = "take-bishop"
requires = ["d-pawn.develop"]
try = [{ capture_type = "bishop" }]
why = "Capture a uniquely available enemy bishop with the developed d-pawn."

[pieces.london-bishop]
ref = "piece:white:bishop:queenside"

[pieces.london-bishop.develop]
to = "f4"
why = "Develop outside the pawn chain as soon as the move becomes legal."

[[pieces.london-bishop.rules]]
id = "escape-attack"
when = { attacked = "self" }
required = true
try = [{ capture = "attacker" }, { move = "g3" }]
why = "Preserve the London bishop when a concrete legal attack threatens it."

[pieces.e-pawn]
ref = "piece:white:pawn:e"

[pieces.e-pawn.develop]
to = "e3"
requires = ["london-bishop.develop"]
why = "Support d4 after the London bishop develops."

[pieces.c-pawn]
ref = "piece:white:pawn:c"

[pieces.c-pawn.develop]
to = "c3"
requires = ["queenside-knight.develop"]
why = "Build the compact London center."

[[pieces.c-pawn.rules]]
id = "challenge-center"
when = { all = [{ at = { piece = "black-d-pawn", square = "d5" } }, { at = { piece = "black-queenside-knight", square = "c6" } }] }
try = [{ move = "c4" }]
why = "Challenge d5 when Black's configured queenside setup permits c4."

[pieces.queenside-knight]
ref = "piece:white:knight:queenside"

[pieces.queenside-knight.develop]
to = "d2"
requires = ["e-pawn.develop"]
why = "Support the compact c3 center."

[[pieces.queenside-knight.rules]]
id = "develop-behind-c4"
when = { at = { piece = "c-pawn", square = "c4" } }
try = [{ move = "c3" }]
why = "Coordinate the queenside knight with the active c4 center."

[[pieces.queenside-knight.rules]]
id = "handle-pressure"
when = { under_defended = "self" }
required = true
try = [{ capture = "attacker" }, { capture_type = "bishop" }, { move = "b3" }, { move = "e2" }]
why = "Resolve excessive legal pressure before continuing normal development."

[pieces.kingside-knight]
ref = "piece:white:knight:kingside"

[pieces.kingside-knight.develop]
to = "f3"
requires = ["e-pawn.develop"]
why = "Develop the kingside knight and guard the center."

[pieces.kingside-bishop]
ref = "piece:white:bishop:kingside"

[pieces.kingside-bishop.develop]
to = "d3"
requires = ["kingside-knight.develop"]
why = "Develop toward the kingside and prepare castling."

[pieces.queen]
ref = "piece:white:queen"

[pieces.queen.develop]
to = "b3"
requires = ["c-pawn.develop"]
why = "Develop toward pressure on d5 and b7."

[pieces.king]
ref = "piece:white:king"

[pieces.king.develop]
to = "g1"
requires = ["kingside-bishop.develop"]
why = "Castle after clearing the kingside."

[pieces.black-c-pawn]
ref = "piece:black:pawn:c"

[pieces.black-d-pawn]
ref = "piece:black:pawn:d"

[pieces.black-queenside-knight]
ref = "piece:black:knight:queenside"

[pieces.black-queenside-bishop]
ref = "piece:black:bishop:queenside"

