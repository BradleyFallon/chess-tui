version = 2
name = "London System"
start_fen = "startpos"
side = "white"

[[opening_tags]]
eco = "A40"
name = "Queen's Pawn Game"

[[opening_tags]]
eco = "D00"
name = "Queen's Pawn Game: Accelerated London System"

[[states]]
id = "london-before-nf3"
when = { all = [{ at = { piece = "piece:white:pawn:d", square = "d4" } }, { at = { piece = "piece:white:bishop:queenside", square = "f4" } }, { at = { piece = "piece:white:pawn:e", square = "e3" } }] }

[[states]]
id = "london-core"
when = { all = [{ state = "london-before-nf3" }, { at = { piece = "piece:white:knight:kingside", square = "f3" } }] }

[[rules]]
id = "develop-d-pawn"
priority = 1000
kind = "development"
piece = "piece:white:pawn:d"
target = "d4"
note = "Control the center."

[[rules]]
id = "develop-dark-bishop"
priority = 900
kind = "development"
piece = "piece:white:bishop:queenside"
target = "f4"
note = "Develop the dark-squared bishop outside the pawn chain."
ready_when = { moved = "piece:white:pawn:d" }

[[rules]]
id = "develop-e-pawn"
priority = 800
kind = "development"
piece = "piece:white:pawn:e"
target = "e3"
note = "Support d4 and prepare normal development."
ready_when = { all = [{ moved = "piece:white:pawn:d" }, { moved = "piece:white:bishop:queenside" }] }

[[rules]]
id = "develop-kingside-knight"
priority = 700
kind = "development"
piece = "piece:white:knight:kingside"
target = "f3"
note = "Develop the king's knight and guard e5."
ready_when = { state = "london-before-nf3" }

[[rules]]
id = "develop-light-bishop"
priority = 600
kind = "development"
piece = "piece:white:bishop:kingside"
target = "d3"
note = "Natural development."
ready_when = { state = "london-core" }

[[rules]]
id = "build-c3"
priority = 500
kind = "development"
piece = "piece:white:pawn:c"
target = "c3"
note = "Build the London pawn chain."
ready_when = { all = [{ state = "london-core" }, { at = { piece = "piece:white:bishop:kingside", square = "d3" } }] }

[[overrides]]
id = "after-d4-e5"
after = ["d4", "e5"]
note = "Capture the offered pawn."
move = { piece = "piece:white:pawn:d", to = "e5" }

[[overrides]]
id = "qa4-check-after-c4"
after = ["d4", "d5", "Bf4", "Nf6", "e3", "e6", "Nf3", "c5", "Bd3", "Qb6", "c3", "c4"]
note = "Use the check to meet Black's queenside expansion."
move = { piece = "piece:white:queen", to = "a4" }

[[overrides]]
id = "qb4-after-bd7"
after = ["d4", "d5", "Bf4", "Nf6", "e3", "e6", "Nf3", "c5", "Bd3", "Qb6", "c3", "c4", "Qa4+", "Bd7"]
note = "Keep pressure on the queenside after ...Bd7."
move = { piece = "piece:white:queen", to = "b4" }

[[overrides]]
id = "allow-c2c3-ply-8"
after = ["d4", "Nf6", "Bf4", "d5", "e3", "c5", "Nf3", "Nc6"]
note = "Added from chat to allow c3 here."
move = { piece = "piece:white:pawn:c", to = "c3" }

[[opponent_replies]]
id = "after-d4-d5-bf4-nf6-e3-e6-nf3-c5-bd3-qb6"
after = ["d4", "d5", "Bf4", "Nf6", "e3", "e6", "Nf3", "c5", "Bd3"]
move = "Qb6"

